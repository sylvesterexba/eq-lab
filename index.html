  <body class="eq-lab-standalone">
    <header class="eq-lab-page-header">
      <div class="eq-lab-standalone-hero">
        <h1 class="bilingual-title">
          <span class="title-en">Interactive EQ Lab</span>
          <span class="title-zh">互動 EQ 實驗室</span>
        </h1>
        <p>
          Practice frequency, gain, Q, and filter type decisions in one interactive control surface.
        </p>
      </div>
    </header>

    <main>
      <section
        class="academy-module academy-module--eq eq-trainer-placeholder"
        id="module-eq-trainer"
        aria-labelledby="moduleEqTitle"
        data-module="eq-trainer"
      >
        <div class="eq-trainer-placeholder__panel">
          <div class="eq-trainer-placeholder__content">
            <h2 id="moduleEqTitle" class="eq-course-only">Interactive EQ Lab</h2>
            <div class="eq-band-preview" id="eqBandPreview" aria-label="EQ band preview"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>Interactive EQ Lab</p>
    </footer>

    <script type="module" src="./js/eqTrainer.js"></script>
